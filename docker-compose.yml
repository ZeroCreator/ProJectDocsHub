services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-docs-hub
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/projectdocs.db
      - LOCAL_STORAGE_PATH=./data/uploads
